name: Build Java Server

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Java server sources
        run: |
          mkdir -p build/classes
          find "!Java 1.3.1 Server src" -name "*.java" -print0 \
            | xargs -0 javac --release 8 -d build/classes
